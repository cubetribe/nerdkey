services:
  setup:
    profiles: ["setup"]
    image: ${KEYGEN_IMAGE:-keygen/api:v1.6}
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DISABLE_DATABASE_ENVIRONMENT_CHECK: "1"
    command: >
      sh -c "
        until pg_isready -h postgres -U ${POSTGRES_USER}; do
          echo 'Waiting for PostgreSQL...'
          sleep 1
        done
        bundle exec rails keygen:setup
      "
    depends_on:
      - postgres
    tty: true
    stdin_open: true

  console:
    profiles: ["console"]
    image: ${KEYGEN_IMAGE:-keygen/api:v1.6}
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    command: bundle exec rails console
    depends_on:
      - postgres
    tty: true
    stdin_open: true

  migrate:
    profiles: ["migrate"]
    image: ${KEYGEN_IMAGE:-keygen/api:v1.6}
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    command: bundle exec rails db:migrate
    depends_on:
      - postgres

  web:
    image: ${KEYGEN_IMAGE:-keygen/api:v1.6}
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    command: web
    ports:
      - "3000:3000"
    volumes:
      - keygen:/etc/keygen
    depends_on:
      - postgres
      - redis

  worker:
    image: ${KEYGEN_IMAGE:-keygen/api:v1.6}
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    command: worker
    volumes:
      - keygen:/etc/keygen
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17.5
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2.8
    restart: unless-stopped
    environment:
      CADDY_HOSTS: "${CADDY_HOSTS:-$KEYGEN_HOST}"
    command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./compose/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  keygen:
  postgres:
  redis:
  caddy_data:
  caddy_config:
